<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karaoke Queue</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <button id="btn-theme-toggle" class="btn-icon" title="Alternar tema">☀️</button>
    <div class="header-left">
      <span class="header-icon">🎤</span>
      <div class="app-title-wrap">
        <h1><span id="app-name">Karaoke Queue</span></h1>
        <button id="btn-edit-name" class="btn-edit-name" title="Editar nome">✏️</button>
        <div id="name-popover" class="name-popover hidden">
          <input id="name-popover-input" type="text" class="name-popover-input" maxlength="30" />
          <button id="btn-name-save" class="btn-name-action btn-name-save" title="Salvar">✓</button>
          <button id="btn-name-cancel" class="btn-name-action btn-name-cancel" title="Cancelar">✕</button>
        </div>
      </div>
    </div>
    <div class="header-right">
      <span id="clock" class="clock"></span>
      <button id="btn-stats" class="btn btn-outline">Estatísticas</button>
      <button id="btn-history" class="btn btn-outline">Expediente Atual</button>
    </div>
  </header>

  <main class="app-main">

    <section class="form-section">
      <form id="form-entry" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label for="input-name">Nome</label>
            <input id="input-name" type="text" placeholder="Nome do cantor" required />
          </div>
          <div class="form-group form-group--sm">
            <label for="input-song">1ª Música</label>
            <input id="input-song" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Ex: 1234" required />
          </div>
          <div class="form-group form-group--sm">
            <label for="input-song2">2ª Música <span class="label-optional">(opcional)</span></label>
            <input id="input-song2" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Ex: 5678" />
          </div>
          <div class="form-group form-group--xs">
            <label for="input-table">Mesa</label>
            <input id="input-table" type="number" placeholder="Ex: 5" min="1" required />
          </div>
          <button type="submit" class="btn btn-primary">+ Adicionar</button>
          <button type="button" id="btn-open-batch" class="btn btn-outline">📋 Adicionar Vários</button>
        </div>
      </form>
    </section>

    <section class="queue-section">
      <div id="now-block" class="now-block hidden"></div>
      <div id="next-block" class="next-block hidden"></div>

      <div class="section-header">
        <h2>Fila de espera <span id="queue-count" class="badge">0</span></h2>
        <span class="section-hint">Ordem de chegada</span>
      </div>

      <div id="queue-list" class="queue-list">
        <div class="empty-state">
          <span class="empty-icon">🎵</span>
          <p>Nenhuma entrada na fila.</p>
          <p>Adicione a primeira música acima!</p>
        </div>
      </div>
    </section>

  </main>

  <div id="history-panel" class="history-panel hidden">
    <div class="history-header">
      <h2>Histórico</h2>
      <button id="btn-close-history" class="btn btn-icon">✕</button>
    </div>
    <div class="history-filters">
      <input id="history-search" type="text" placeholder="Buscar por cantor..." class="history-search-input" />
      <div id="history-table-filters" class="history-table-filters"></div>
      <div class="history-filter-row">
        <button id="btn-sort-history" class="btn btn-outline btn-sm" title="Alternar ordenação">↓ Recente</button>
      </div>
    </div>
    <div id="history-list" class="history-list">
      <div class="empty-state">
        <span class="empty-icon">📋</span>
        <p>Nenhum registro no histórico.</p>
      </div>
    </div>
  </div>

  <div id="stats-panel" class="stats-panel hidden">
    <div class="stats-header">
      <h2>📊 Estatísticas</h2>
      <button id="btn-close-stats" class="btn btn-icon">✕</button>
    </div>
    <div class="stats-filters">
      <div class="stats-date-row">
        <div class="stats-date-group">
          <label class="stats-range-label">Data</label>
          <div class="stats-date-with-clear">
            <input type="date" id="stats-filter-date" class="stats-date-input" />
            <button class="btn-clear-date" id="btn-clear-date" title="Limpar">✕</button>
          </div>
        </div>
        <div class="stats-date-sep">ou</div>
        <div class="stats-date-group stats-date-group--period">
          <label class="stats-range-label">Período</label>
          <div class="stats-period-inputs">
            <input type="date" id="stats-filter-from" class="stats-date-input" />
            <span class="stats-period-dash">—</span>
            <input type="date" id="stats-filter-to" class="stats-date-input" />
            <button class="btn-clear-date" id="btn-clear-period" title="Limpar">✕</button>
          </div>
        </div>
      </div>
      <input id="stats-search-name" type="text" placeholder="Buscar por cantor..." class="history-search-input" />
      <input id="stats-search-table" type="number" placeholder="Mesa..." class="history-search-input stats-search-table" min="1" />
    </div>
    <div class="stats-body" id="stats-body">
    </div>
  </div>

  <div id="batch-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>📋 Adicionar Vários</h2>
        <button id="btn-close-batch" class="btn btn-icon">✕</button>
      </div>
      <div class="modal-body">
        <div class="batch-header-row">
          <span>Nome</span>
          <span>1ª Música</span>
          <span>2ª Música <span class="label-optional">(opcional)</span></span>
          <span>Mesa</span>
          <span></span>
        </div>
        <div id="batch-rows"></div>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-left">
          <button id="btn-add-batch-row" class="btn btn-outline">+ Adicionar linha</button>
          <span id="batch-count-label" class="batch-count-label">0 entradas prontas</span>
        </div>
        <div class="modal-actions">
          <button id="btn-cancel-batch" class="btn btn-outline">Cancelar</button>
          <button id="btn-confirm-batch" class="btn btn-primary">Confirmar Todos</button>
        </div>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="modal hidden">
    <div class="modal-box modal-box--sm">
      <div class="modal-header">
        <h2>✏️ Editar Registro</h2>
        <button id="btn-close-edit" class="btn btn-icon">✕</button>
      </div>
      <div class="modal-body edit-modal-body">
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label for="edit-name">Nome</label>
          <input id="edit-name" type="text" placeholder="Nome do cantor" />
        </div>
        <div class="edit-songs-row">
          <div class="form-group">
            <label for="edit-song">1ª Música</label>
            <input id="edit-song" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Ex: 1234" />
          </div>
          <div class="form-group">
            <label for="edit-song2">2ª Música <span class="label-optional">(opcional)</span></label>
            <input id="edit-song2" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Ex: 5678" />
          </div>
        </div>
        <div class="form-group form-group--xs">
          <label for="edit-table">Mesa</label>
          <input id="edit-table" type="number" placeholder="Ex: 5" min="1" />
        </div>
      </div>
      <div class="modal-footer">
        <div></div>
        <div class="modal-actions">
          <button id="btn-cancel-edit" class="btn btn-outline">Cancelar</button>
          <button id="btn-save-edit" class="btn btn-primary">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="table-modal" class="modal hidden">
    <div class="modal-box modal-box--sm">
      <div class="modal-header">
        <h2 id="table-modal-title"></h2>
        <button id="btn-close-table-modal" class="btn-icon">✕</button>
      </div>
      <div class="modal-body table-modal-body" id="table-modal-body"></div>
      <div class="modal-footer">
        <button id="btn-reset-table" class="btn btn-danger-outline btn-sm">↺ Resetar mesa</button>
        <div></div>
      </div>
    </div>
  </div>

  <div id="startup-modal" class="modal hidden">
    <div class="modal-box startup-box">
      <div class="startup-icon">🎤</div>
      <div class="startup-content">
        <h2 id="startup-message" class="startup-message"></h2>
        <p id="startup-detail" class="startup-detail"></p>
        <p id="startup-running" class="startup-running"></p>
      </div>
      <div class="startup-actions">
        <button id="btn-startup-secondary" class="btn btn-outline"></button>
        <button id="btn-startup-primary" class="btn btn-primary"></button>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay hidden"></div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
